<div class="shitter-list-container">
  <h2>Shitter Directory</h2>

  <div class="shitter-list-container">
    <h2>Shitter Directory</h2>

    @if (shitters.length == 0) {
      <div class="empty-state">No shitter records available yet.</div>
    } @else {
      <table class="shitter-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Nae</th>
            <th>Email</th>
            <th>Password</th>
          </tr>
        </thead>
        <tbody>
          @for (s of shitters; track s.Shitterid) {
            <tr>
              <td>{{ s.Shitterid }}</td>
              <td>{{ s.FirstName }}</td>
              <td>{{ s.LastName }}</td>
              <td>{{ s.Email }}</td>
              <td>{{ s.Password }}</td>
              <td>
                <button (click)="deleteShitter(s.Shitterid)" class="delete-btn">Delete</button>
              </td>
            </tr>
          }
          <tr class="form-row">
            <td>
              <input
                type="number"
                placeholder="ID"
                [(ngModel)]="newShitter.Shitterid"
                class="form-input"
              />
            </td>
            <td>
              <input
                type="text"
                placeholder="First Name"
                [(ngModel)]="newShitter.FirstName"
                class="form-input"
              />
            </td>
            <td>
              <input
                type="text"
                placeholder="Last Name"
                [(ngModel)]="newShitter.LastName"
                class="form-input"
              />
            </td>
            <td>
              <input
                type="email"
                placeholder="Email"
                [(ngModel)]="newShitter.Email"
                class="form-input"
              />
            </td>
            <td>
              <input
                type="password"
                placeholder="Password"
                [(ngModel)]="newShitter.Password"
                class="form-input"
              />
            </td>
            <td><button (click)="createShitter()" class="create-btn">Create</button></td>
          </tr>
        </tbody>
      </table>
    }
  </div>
</div>
